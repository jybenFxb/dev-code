name: moneybook
description: A simple and beautiful personal finance tracker app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # 本地数据库
  sqflite: ^2.3.3
  path: ^1.9.0

  # 路由
  go_router: ^14.2.0

  # 图表
  fl_chart: ^0.68.0

  # 工具
  intl: ^0.19.0
  uuid: ^4.4.0
  shared_preferences: ^2.2.3

  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.13

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
